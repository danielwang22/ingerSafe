name: ingresafe
description: A Flutter application for AI image analysis
version: 1.1.0+11

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_hooks: ^0.21.2
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.0.4
  flutter_plugin_android_lifecycle: ^2.0.15
  google_mlkit_commons: ^0.11.0
  permission_handler: ^12.0.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^6.0.0
  path_provider: ^2.1.1
  flutter_riverpod: ^2.6.1
  image: ^4.0.17
  url_launcher: ^6.3.2  # or the latest version
  flutter_inappwebview: ^6.0.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4 # if needed
  cloud_firestore: ^6.1.2  # or latest
  flutter_launcher_icons: ^0.14.3
  connectivity_plus: ^7.0.0
  showcaseview: ^5.0.1
  flutter_markdown: ^0.7.7+1
  intl: ^0.20.2
  flutter_svg: ^2.0.10
  dotted_border: ^2.1.0
  google_fonts: ^6.1.0
  package_info_plus: ^8.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/images/icons/
    - assets/icon/

  fonts:
    - family: zh-tw
      fonts:
        - asset: assets/fonts/NotoSansTC-Black.ttf
